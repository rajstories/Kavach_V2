version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: kavach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kavach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kavach"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    image: python:3.11-slim
    container_name: kavach-ml
    working_dir: /app
    volumes:
      - ./ml-service:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    image: node:20
    container_name: kavach-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/kavach?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.example.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      ML_SERVICE_URL: http://ml-service:8000
      JWT_SECRET: ${JWT_SECRET:-change-me}
      PORT: 5000
    command: sh -c "npm install && npx prisma generate && npm run db:push && npm run dev"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20
    container_name: kavach-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5173',res=>process.exit(res.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
